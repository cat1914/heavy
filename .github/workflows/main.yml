name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake g++

    - name: cd
      run: cd heavy
      
    - name: ls
      run: ls

    - name: Create build directory
      run: mkdir -p build
      
    - name: Configure CMake
      run: cd build && cmake ..
    
    - name: Build
      run: cd build && make
    
    - name: Run tests
      run: cd build && ./heavy_test
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: heavy-library
        path: |
          build/libheavy-*.so
          include/
